<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trash | My-Cloud-Doc</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
  <style>
/* ================= RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ================= BASE ================= */
body {
  font-family: 'Inter', sans-serif;
  background: #f1f5f9;
  color: #0f172a;
  min-height: 100vh;
  padding: 24px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ================= HEADER ================= */
.header {
  background: white;
  border-radius: 16px;
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  flex-wrap: wrap;
}

.page-title {
  font-size: 24px;
  font-weight: 700;
  color: #0f172a;
  display: flex;
  align-items: center;
  gap: 10px;
}

.back-btn {
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  color: #1e293b;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  transition: 0.2s ease;
}

.back-btn:hover {
  background: #e5e7eb;
}

/* ================= DANGER BUTTON ================= */
.empty-btn {
  background: #fee2e2;
  color: #991b1b;
  border: none;
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.empty-btn:hover:not(:disabled) {
  background: #fecaca;
}

.empty-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* ================= WARNING ================= */
.warning-banner {
  background: #fff7ed;
  border-left: 4px solid #fb923c;
  padding: 14px 18px;
  border-radius: 10px;
  margin-bottom: 24px;
  font-size: 14px;
  color: #9a3412;
}

/* ================= STATS ================= */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  border: 1px solid #e5e7eb;
}

.stat-icon {
  width: 44px;
  height: 44px;
  font-size: 22px;
  background: #e0f2fe;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
}

.stat-label {
  font-size: 13px;
  color: #64748b;
}

/* ================= CONTROLS ================= */
.controls {
  background: white;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 220px;
}

.search-box input {
  width: 100%;
  padding: 10px 12px 10px 38px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
}

.search-box input:focus {
  outline: none;
  border-color: #3b82f6;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: #94a3b8;
}

.sort-select {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  background: white;
  cursor: pointer;
}

/* ================= LIST ================= */
.trash-list {
  background: white;
  border-radius: 18px;
  padding: 24px;
  border: 1px solid #e5e7eb;
}

.trash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* ================= CARD ================= */
.trash-item {
  position: relative;   /* 👈 REQUIRED */
  background: white;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  padding: 18px;
  transition: 0.25s ease;
}


.trash-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.08);
}

.trash-select input {
  pointer-events: auto;
}

.trash-item {
  cursor: default;
}


.file-icon {
  font-size: 36px;
  text-align: center;
  margin-bottom: 12px;
}

.file-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-meta {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 14px;
}

/* ================= ACTIONS ================= */
.actions {
  display: flex;
  gap: 8px;
}

.action-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.restore-btn {
  background: #dcfce7;
  color: #166534;
}

.restore-btn:hover {
  background: #bbf7d0;
}

.delete-btn {
  background: #fee2e2;
  color: #991b1b;
}

.delete-btn:hover {
  background: #fecaca;
}

/* ================= EMPTY ================= */
.empty-state {
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
}

.empty-icon {
  font-size: 64px;
  margin-bottom: 16px;
}

.empty-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

.empty-desc {
  font-size: 14px;
}

/* ===== MODAL BASE ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.45);
  backdrop-filter: blur(4px);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: white;
  border-radius: 14px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  overflow: hidden;
  animation: modalPop 0.25s ease;
}

@keyframes modalPop {
  from {
    transform: translateY(10px) scale(0.95);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

/* ===== HEADER ===== */
.delete-header {
  padding: 16px 20px;
  background: #fee2e2;
  color: #991b1b;
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ===== BODY ===== */
.delete-body {
  padding: 20px;
  text-align: center;
  font-size: 14px;
  color: #475569;
}

.delete-body p {
  margin-bottom: 10px;
}

.delete-body strong {
  display: block;
  font-size: 15px;
  color: #0f172a;
  background: #f8fafc;
  padding: 10px;
  border-radius: 8px;
  word-break: break-word;
}

/* ===== ACTIONS ===== */
.delete-actions {
  padding: 16px;
  display: flex;
  gap: 12px;
  border-top: 1px solid #e5e7eb;
}

.delete-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

/* Cancel */
.delete-btn.cancel {
  background: #f1f5f9;
  color: #1e293b;
}

.delete-btn.cancel:hover {
  background: #e5e7eb;
}

/* Delete */
.delete-btn.danger {
  background: #dc2626;
  color: white;
}

.delete-btn.danger:hover {
  background: #b91c1c;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
  .header {
    flex-direction: column;
    align-items: stretch;
  }
  .actions {
    flex-direction: column;
  }
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #0f172a;
  color: white;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition: all 0.35s ease;
  z-index: 3000;
  max-width: 320px;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.success {
  background: #16a34a;
}

.toast.error {
  background: #dc2626;
}

.toast.warning {
  background: #d97706;
}
/* ===== MULTI SELECT ===== */
.trash-select {
  position: absolute;
  top: 14px;
  left: 14px;
}

.trash-select input {
  width: 18px;
  height: 18px;
  accent-color: #dc2626;
  cursor: pointer;
}

.trash-item.selected {
  border-color: #dc2626;
  background: #fff5f5;
  box-shadow: 0 8px 24px rgba(220,38,38,0.2);
}

/* ===== BULK ACTION BAR ===== */
.bulk-bar {
  position: sticky;
  bottom: 20px;
  margin-top: 24px;
  background: white;
  border-radius: 14px;
  padding: 14px 18px;
  display: none;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 12px 32px rgba(0,0,0,0.15);
  border: 1px solid #fee2e2;
  animation: slideUp 0.25s ease;
}

.bulk-bar.active {
  display: flex;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.bulk-info {
  font-weight: 600;
  color: #1e293b;
}

.bulk-actions {
  display: flex;
  gap: 12px;
}

.bulk-actions button {
  padding: 10px 16px;
  border-radius: 10px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.bulk-restore {
  background: #dcfce7;
  color: #16a34a;
}

.bulk-delete {
  background: #fee2e2;
  color: #dc2626;
}
/* ===== SELECT ALL ===== */
.select-all {
  padding: 8px 12px;
  border-radius: 10px;
  background: #f8fafc;
  border: 1px solid #e5e7eb;
}

.select-all input {
  width: 18px;
  height: 18px;
  accent-color: #dc2626;
  cursor: pointer;
}



</style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div>
        <a href="home.html" class="back-btn" aria-label="Back to Dashboard">
          ← Back to Dashboard
        </a>
      </div>
      <h1 class="page-title">🗑️ Trash</h1>
      <button class="empty-btn" id="emptyBtn" onclick="emptyTrash()" disabled>🔥 Empty Trash</button>
    </div>

    <div class="warning-banner">
      ⚠️ <strong id="trashCount">0</strong> file(s) in trash • Files are auto-deleted after 30 days
    </div>

    <div class="stats">
      <div class="stat-card">
        <span class="stat-icon">📄</span>
        <div>
          <div class="stat-value" id="totalFiles">0</div>
          <div class="stat-label">Files in Trash</div>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">💾</span>
        <div>
          <div class="stat-value" id="totalSize">0 KB</div>
          <div class="stat-label">Total Size</div>
        </div>
      </div>
    </div>

    <div class="controls">

  <div class="select-all" id="selectAllWrapper">
    <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">
    <label for="selectAll">Select all</label>
  </div>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput"
           placeholder="Search deleted files..."
           oninput="renderTrash()" />
  </div>

  <select class="sort-select" id="sortSelect" onchange="renderTrash()">
    <option value="date">Newest Deleted</option>
    <option value="dateOld">Oldest Deleted</option>
    <option value="name">Name A–Z</option>
    <option value="nameDesc">Name Z–A</option>
  </select>

</div>

    <!-- Delete Permanently Modal -->
<div id="deleteModal" class="modal">
  <div class="modal-content delete-dialog">

    <div class="delete-header">
      <span>Delete File Permanently</span>
    </div>

    <div class="delete-body">
      <p>This action cannot be undone.</p>
      <strong id="deleteFileName"></strong>
    </div>

    <div class="delete-actions">
      <button class="delete-btn cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="delete-btn danger" onclick="confirmPermanentDelete()">Delete</button>
    </div>

  </div>
</div>


    <div class="trash-list">
      <div class="trash-grid" id="trashContainer">
        <div class="empty-state">
          <div class="empty-icon">🗑️</div>
          <div class="empty-title">Loading trash...</div>
          <div class="empty-desc">Please wait...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bulk-bar" id="bulkBar">
  <div class="bulk-info">
    <span id="selectedCount">0</span> file(s) selected
  </div>

  <div class="bulk-actions">
    <button class="bulk-restore" onclick="bulkRestore()">Restore</button>
    <button class="bulk-delete" onclick="bulkDelete()">Delete</button>
  </div>
</div>

  <!-- Toast Notification -->
<div id="toast" class="toast"></div>
  <script>
    let deleteDocId = null;
    let deleteFileId = null;
    let deleteFileName = '';


    // ========== APPWRITE CONFIG ==========
    const client = new Appwrite.Client()
      .setEndpoint("https://fra.cloud.appwrite.io/v1")
      .setProject("6956479a002cb6075a9d");

    const account = new Appwrite.Account(client);
    const storage = new Appwrite.Storage(client);
    const databases = new Appwrite.Databases(client);

    const BUCKET_ID = "6957d9df0019e749a227";
    const DATABASE_ID = "6956ba3a003ab5b4406a";
    const COLLECTION_ID = "files";

    let userId = null;
    let trashDocuments = [];

    // ========== INIT ==========
    async function init() {
      try {
        const user = await account.get();
        userId = user.$id;
        await loadTrash();
      } catch (error) {
        console.error("Auth failed:", error);
        window.location.href = "index.html";
      }
    }

    // ========== LOAD TRASH FROM APPWRITE ==========
    async function loadTrash() {
      try {
        const res = await databases.listDocuments(
          DATABASE_ID,
          COLLECTION_ID,
          [
            Appwrite.Query.equal("userId", userId),
            Appwrite.Query.equal("isDeleted", true),
            Appwrite.Query.orderDesc("deletedAt")
          ]
        );
        
        trashDocuments = res.documents;
        renderTrash();
      } catch (error) {
        console.error("Load trash error:", error);
        document.getElementById('trashContainer').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Error loading trash</div>
            <div class="empty-desc">${error.message || 'Please try again'}</div>
          </div>
        `;
      }
    }

    // ========== RENDER TRASH ==========
    function renderTrash() {
      const container = document.getElementById('trashContainer');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const sort = document.getElementById('sortSelect').value;
      
      let filtered = trashDocuments.filter(doc => 
        doc.fileName.toLowerCase().includes(search)
      );

      // Sort
      switch(sort) {
        case 'name':
          filtered.sort((a, b) => a.fileName.localeCompare(b.fileName));
          break;
        case 'nameDesc':
          filtered.sort((a, b) => b.fileName.localeCompare(a.fileName));
          break;
        case 'dateOld':
          filtered.sort((a, b) => new Date(a.deletedAt) - new Date(b.deletedAt));
          break;
        default:
          filtered.sort((a, b) => new Date(b.deletedAt) - new Date(a.deletedAt));
      }

      // Update stats
      document.getElementById('totalFiles').textContent = filtered.length;
      document.getElementById('trashCount').textContent = filtered.length;
      
      const totalBytes = filtered.reduce((sum, doc) => sum + (doc.fileSize || 0), 0);
      document.getElementById('totalSize').textContent = formatFileSize(totalBytes);
      document.getElementById('emptyBtn').disabled = filtered.length === 0;

      // Empty state
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🗑️</div>
            <div class="empty-title">Trash is empty</div>
            <div class="empty-desc">Deleted files will appear here</div>
          </div>
        `;
        return;
      }

      // Render items
      container.innerHTML = filtered.map(doc => `
  <div class="trash-item" data-id="${doc.$id}">
    
    <!-- Checkbox -->
    <div class="trash-select">
      <input type="checkbox"
        onchange="toggleSelect(this, '${doc.$id}')">
    </div>

    <div class="file-icon">${getFileIcon(doc.fileName)}</div>

    <div class="file-name" title="${escapeHtml(doc.fileName)}">
      ${escapeHtml(doc.fileName)}
    </div>

    <div class="file-meta">
      <div class="file-meta-item">📦 ${formatFileSize(doc.fileSize)}</div>
      <div class="file-meta-item">🗓️ Deleted: ${formatDate(doc.deletedAt)}</div>
    </div>

    <div class="actions">
      <button class="action-btn restore-btn"
        onclick="restoreFile('${doc.$id}', '${doc.fileId}', '${escapeHtml(doc.fileName)}')">
        ↩️ Restore
      </button>

      <button class="action-btn delete-btn"
        onclick="deleteFilePermanently('${doc.$id}', '${doc.fileId}', '${escapeHtml(doc.fileName)}')">
        🗑️ Delete
      </button>
    </div>
  </div>
`).join('');
    }

    // ========== RESTORE FILE ==========
    async function restoreFile(docId, fileId, fileName) {
  try {
    await databases.updateDocument(
      DATABASE_ID,
      COLLECTION_ID,
      docId,
      {
        isDeleted: false,
        deletedAt: null
      }
    );

    // 🔔 notify other pages
    localStorage.setItem("trashChanged", Date.now());

   showToast(`"${fileName}" restored successfully`, 'success');

    await loadTrash();
  } catch (error) {
    console.error("Restore error:", error);
showToast("Failed to restore file", 'error');

  }
}


    // ========== DELETE FILE PERMANENTLY ==========
    function deleteFilePermanently(docId, fileId, fileName) {
  deleteDocId = docId;
  deleteFileId = fileId;
  deleteFileName = fileName;

  document.getElementById('deleteFileName').textContent = fileName;
  document.getElementById('deleteModal').classList.add('active');
}

    function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('active');
  deleteDocId = deleteFileId = deleteFileName = null;
}

async function confirmPermanentDelete() {
  try {
    await storage.deleteFile(BUCKET_ID, deleteFileId);
    await databases.deleteDocument(DATABASE_ID, COLLECTION_ID, deleteDocId);

    closeDeleteModal();
    localStorage.setItem("trashChanged", Date.now());
    await loadTrash();

  } catch (error) {
    console.error("Permanent delete error:", error);
showToast("Failed to delete file", 'error');

  }
}

    // ========== EMPTY TRASH ==========
    async function emptyTrash() {
      if (trashDocuments.length === 0) {
        showToast("Trash is already empty", 'warning');
        return;
      }

      
      if (!confirm(`Permanently delete all ${trashDocuments.length} file(s)? This action cannot be undone.`)) return;
      
      let successCount = 0;
      
      for (const doc of trashDocuments) {
        try {
          await storage.deleteFile(BUCKET_ID, doc.fileId);
          await databases.deleteDocument(DATABASE_ID, COLLECTION_ID, doc.$id);
          successCount++;
        } catch (error) {
          console.error("Failed to delete:", doc.fileName, error);
        }
      }
      
        showToast(`Trash emptied successfully (${successCount} files deleted)`, 'success');
        await loadTrash();
    }

    // ========== UTILS ==========
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'Unknown';
      const date = new Date(dateStr);
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
    }

    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const icons = {
        pdf: '📄',
        doc: '📘', docx: '📘',
        xls: '📗', xlsx: '📗',
        jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️',
        txt: '📝',
        zip: '📦', rar: '📦',
        mp4: '🎥', avi: '🎥', mov: '🎥',
        mp3: '🎵', wav: '🎵'
      };
      return icons[ext] || '📄';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== MODAL CLICK OUTSIDE TO CLOSE ==========
    document.getElementById('deleteModal').addEventListener('click', e => {
  if (e.target.id === 'deleteModal') closeDeleteModal();
});

// ========== TOAST NOTIFICATION ==========
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast show ${type}`;

  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}
// ===== MULTI SELECT LOGIC =====
let selectedTrash = new Set();

function toggleSelect(checkbox, docId) {
  const card = checkbox.closest('.trash-item');

  if (checkbox.checked) {
    selectedTrash.add(docId);
    card.classList.add('selected');
  } else {
    selectedTrash.delete(docId);
    card.classList.remove('selected');
  }

 syncSelectAll();
updateBulkBar();

}

function syncSelectAll() {
  const allCheckboxes = document.querySelectorAll('.trash-select input');
  const checked = document.querySelectorAll('.trash-select input:checked');

  const selectAll = document.getElementById('selectAll');
  if (!selectAll) return;

  selectAll.checked = allCheckboxes.length > 0 && checked.length === allCheckboxes.length;
}


function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  document.getElementById('selectedCount').textContent = selectedTrash.size;
  bar.classList.toggle('active', selectedTrash.size > 0);
}

// ===== BULK RESTORE =====
async function bulkRestore() {
  if (selectedTrash.size === 0) return;

  const ids = Array.from(selectedTrash); // snapshot

  try {
    for (const id of ids) {
      await databases.updateDocument(
        DATABASE_ID,
        COLLECTION_ID,
        id,
        { isDeleted: false, deletedAt: null }
      );
    }

    selectedTrash.clear();
    updateBulkBar();

    const selectAll = document.getElementById('selectAll');
    if (selectAll) selectAll.checked = false;

    showToast("Selected files restored", "success");
    await loadTrash();

  } catch (error) {
    console.error("Bulk restore failed:", error);
    showToast("Failed to restore selected files", "error");
  }
}

// ===== BULK DELETE =====
async function bulkDelete() {
  for (const id of selectedTrash) {
    const doc = trashDocuments.find(d => d.$id === id);
    if (!doc) continue;

    await storage.deleteFile(BUCKET_ID, doc.fileId);
    await databases.deleteDocument(DATABASE_ID, COLLECTION_ID, id);
  }

  selectedTrash.clear();
  showToast("Selected files deleted permanently", "success");
  await loadTrash();
}

function toggleSelectAll(masterCheckbox) {
  const checkboxes = document.querySelectorAll('.trash-select input');

  selectedTrash.clear();

  checkboxes.forEach(cb => {
    cb.checked = masterCheckbox.checked;

    const card = cb.closest('.trash-item');
    const id = card.dataset.id;

    if (masterCheckbox.checked) {
      selectedTrash.add(id);
      card.classList.add('selected');
    } else {
      card.classList.remove('selected');
    }
  });

  updateBulkBar();
}
