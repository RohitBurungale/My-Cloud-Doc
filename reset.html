<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Appwrite SDK -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: "Inter", sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
}

.box {
  width: 420px;
  background: #020617;
  padding: 36px;
  border-radius: 18px;
  border: 1px solid #1e293b;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7);
}

h2 {
  text-align: center;
  color: #e5e7eb;
  margin-bottom: 22px;
}

.input-wrap {
  position: relative;
}

input {
  width: 100%;
  padding: 14px 44px 14px 16px;
  margin-top: 12px;
  border-radius: 12px;
  border: 1px solid #1e293b;
  background: #020617;
  color: #e5e7eb;
  font-size: 14px;
}

input::placeholder {
  color: #64748b;
}

.eye {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #94a3b8;
  font-size: 18px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 16px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
}
</style>
</head>

<body>

<div class="box">
  <h2>Reset Password</h2>

  <div class="input-wrap">
    <input id="newPassword" type="password" placeholder="New Password">
    <span class="eye" onclick="togglePassword('newPassword', this)">👁</span>
  </div>

  <div class="input-wrap">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">
    <span class="eye" onclick="togglePassword('confirmPassword', this)">👁</span>
  </div>

  <button onclick="resetPassword()">Update Password</button>
</div>

<script>
/* APPWRITE CONFIG */
const client = new Appwrite.Client()
  .setEndpoint("https://fra.cloud.appwrite.io/v1")
  .setProject("6956479a002cb6075a9d");

const account = new Appwrite.Account(client);

/* GET PARAMS FROM RESET LINK */
const params = new URLSearchParams(window.location.search);
const userId = params.get("userId");
const secret = params.get("secret");

/* BLOCK INVALID LINKS */
if (!userId || !secret) {
  alert("Invalid or expired reset link");
  throw new Error("Invalid recovery link");
}

/* TOGGLE PASSWORD VISIBILITY */
function togglePassword(id, el) {
  const input = document.getElementById(id);
  const isHidden = input.type === "password";
  input.type = isHidden ? "text" : "password";
  el.textContent = isHidden ? "🙈" : "👁";
}

/* RESET PASSWORD */
async function resetPassword() {
  const pass = newPassword.value;
  const confirm = confirmPassword.value;

  if (!pass || !confirm) {
    alert("All fields are required");
    return;
  }

  if (pass !== confirm) {
    alert("Passwords do not match");
    return;
  }

  try {
    await account.updateRecovery(userId, secret, pass);
    alert("Password updated successfully ✅");
    window.location.href = "lo.html";
  } catch {
    alert("Reset link expired or already used");
  }
}
</script>

</body>
</html>
